site_name: Python-KSEF Documentation
site_description: A Python library for the Polish KSEF (National e-Invoice System)

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: tutorials/getting-started/installation.md
    - Authentication: tutorials/getting-started/authentication.md
  - Invoices:
    - Sending Invoices: tutorials/invoices/sending-invoices.md
    - Foreign Currency: tutorials/invoices/foreign-currency.md
    - Downloading Invoices: tutorials/invoices/downloading-invoices.md
  - Reference:
    - Invoice Models: reference/invoice-models.md
    - Tax Rates: reference/tax-rates.md
    - Tax Summary: reference/tax-summary.md
    - Additional Recipients: reference/additional-recipients.md
    - Invoice Annotations: reference/invoice-annotations.md
